name: Desktop CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  CARGO_INCREMENTAL: 0
  TAURI_SKIP_FRONTEND_BUILD_CONFIG: '{"build":{"beforeBuildCommand":""}}'

jobs:
  prepare-frontend:
    name: Prepare frontend dist
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend dist
        run: bun run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v6
        with:
          name: desktop-frontend-dist
          if-no-files-found: error
          retention-days: 7
          path: dist/

  build-windows-and-macos:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - name: Windows arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
          - name: macOS Intel
            runner: macos-26-intel
            target: x86_64-apple-darwin
          - name: macOS arm64
            runner: macos-26
            target: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read Rust toolchain channel
        id: rust-toolchain
        shell: bash
        run: |
          toolchain="$(sed -nE 's/^channel = "(.*)"$/\1/p' rust-toolchain.toml | head -n1)"
          if [[ -z "$toolchain" ]]; then
            echo "Could not read 'channel' from rust-toolchain.toml" >&2
            exit 1
          fi
          echo "toolchain=$toolchain" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain and target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.toolchain }}
          targets: ${{ matrix.target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app target
        run: bun run tauri build --debug --target ${{ matrix.target }} --no-bundle --verbose

  build-linux:
    name: ${{ matrix.name }}
    needs: prepare-frontend
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 150
    env:
      CROSS_CONFIG: ${{ github.workspace }}/Cross.toml
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64 GNU
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            use_cross: false
          - name: Linux riscv64 GNU
            runner: ubuntu-24.04
            target: riscv64gc-unknown-linux-gnu
            use_cross: true
          - name: Linux arm64 GNU
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            use_cross: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: desktop-frontend-dist
          path: dist

      - name: Install Linux native system dependencies
        if: ${{ !matrix.use_cross }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            wget \
            xdg-utils

      - name: Read Rust toolchain channel
        id: rust-toolchain
        shell: bash
        run: |
          toolchain="$(sed -nE 's/^channel = "(.*)"$/\1/p' rust-toolchain.toml | head -n1)"
          if [[ -z "$toolchain" ]]; then
            echo "Could not read 'channel' from rust-toolchain.toml" >&2
            exit 1
          fi
          echo "toolchain=$toolchain" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain and target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.toolchain }}
          targets: ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.use_cross }}
        shell: bash
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Verify Docker availability
        if: ${{ matrix.use_cross }}
        shell: bash
        run: docker version

      - name: Build Linux target with cross
        if: ${{ matrix.use_cross }}
        shell: bash
        run: |
          target_env="${{ matrix.target }}"
          target_env_underscore="${target_env//-/_}"

          echo "Using cross config at: $CROSS_CONFIG"
          export PKG_CONFIG_ALLOW_CROSS=1
          export PKG_CONFIG_SYSROOT_DIR=/
          export TARGET_PKG_CONFIG_ALLOW_CROSS=1
          export TARGET_PKG_CONFIG_SYSROOT_DIR=/
          export "PKG_CONFIG_ALLOW_CROSS_${target_env_underscore}=1"
          export "PKG_CONFIG_SYSROOT_DIR_${target_env_underscore}=/"

          cross build \
            --manifest-path src-tauri/Cargo.toml \
            --target ${{ matrix.target }} \
            --verbose

      - name: Build Linux target natively
        if: ${{ !matrix.use_cross }}
        shell: bash
        run: |
          cargo build \
            --manifest-path src-tauri/Cargo.toml \
            --target ${{ matrix.target }} \
            --verbose
