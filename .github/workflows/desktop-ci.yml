name: Desktop CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: hyperion-windows-x64
          - name: Windows arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact: hyperion-windows-arm64
          - name: macOS Intel
            runner: macos-26-intel
            target: x86_64-apple-darwin
            artifact: hyperion-macos-intel
          - name: macOS arm64
            runner: macos-26
            target: aarch64-apple-darwin
            artifact: hyperion-macos-arm64
          - name: Linux x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: hyperion-linux-x64
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: hyperion-linux-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm \
            wget \
            xdg-utils

      - name: Read Rust toolchain channel
        id: rust-toolchain
        shell: bash
        run: |
          toolchain="$(sed -nE 's/^channel = "(.*)"$/\1/p' rust-toolchain.toml | head -n1)"
          if [[ -z "$toolchain" ]]; then
            echo "Could not read 'channel' from rust-toolchain.toml" >&2
            exit 1
          fi
          echo "toolchain=$toolchain" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain and target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.toolchain }}
          targets: ${{ matrix.target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri bundles
        run: bun run tauri build --debug --target ${{ matrix.target }} --no-bundle --verbose
