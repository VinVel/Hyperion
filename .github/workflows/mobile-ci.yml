name: Mobile CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  CARGO_INCREMENTAL: 0

jobs:
  android-split:
    name: Android ${{ matrix.abi_label }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - tauri_target: aarch64
            rust_target: aarch64-linux-android
            abi_label: arm64-v8a
            gradle_flavor: arm64
          - tauri_target: armv7
            rust_target: armv7-linux-androideabi
            abi_label: armeabi-v7a
            gradle_flavor: arm
          - tauri_target: i686
            rust_target: i686-linux-android
            abi_label: x86
            gradle_flavor: x86
          - tauri_target: x86_64
            rust_target: x86_64-linux-android
            abi_label: x86_64
            gradle_flavor: x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read Rust toolchain channel
        id: rust-toolchain
        shell: bash
        run: |
          toolchain="$(sed -nE 's/^channel = "(.*)"$/\1/p' rust-toolchain.toml | head -n1)"
          if [[ -z "$toolchain" ]]; then
            echo "Could not read 'channel' from rust-toolchain.toml" >&2
            exit 1
          fi
          echo "toolchain=$toolchain" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain and target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.toolchain }}
          targets: ${{ matrix.rust_target }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.1.12297006" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.1.12297006" >> "$GITHUB_ENV"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Build ABI-specific Android APK
        run: bun run tauri android build --ci --apk --split-per-abi --target ${{ matrix.tauri_target }}

      - name: Upload Android APK
        uses: actions/upload-artifact@v6
        with:
          name: hyperion-android-${{ matrix.abi_label }}
          if-no-files-found: error
          retention-days: 14
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  android-universal:
    name: Android universal
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read Rust toolchain channel
        id: rust-toolchain
        shell: bash
        run: |
          toolchain="$(sed -nE 's/^channel = "(.*)"$/\1/p' rust-toolchain.toml | head -n1)"
          if [[ -z "$toolchain" ]]; then
            echo "Could not read 'channel' from rust-toolchain.toml" >&2
            exit 1
          fi
          echo "toolchain=$toolchain" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain and Android targets
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.toolchain }}
          targets: |
            aarch64-linux-android
            armv7-linux-androideabi
            i686-linux-android
            x86_64-linux-android

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.1.12297006" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.1.12297006" >> "$GITHUB_ENV"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Build universal Android APK
        run: bun run tauri android build --ci --apk

      - name: Upload universal Android APK
        uses: actions/upload-artifact@v6
        with:
          name: hyperion-android-universal
          if-no-files-found: error
          retention-days: 14
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk

  ios:
    name: iOS signed IPA
    runs-on: macos-15
    timeout-minutes: 120
    env:
      IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read Rust toolchain channel
        id: rust-toolchain
        shell: bash
        run: |
          toolchain="$(sed -nE 's/^channel = "(.*)"$/\1/p' rust-toolchain.toml | head -n1)"
          if [[ -z "$toolchain" ]]; then
            echo "Could not read 'channel' from rust-toolchain.toml" >&2
            exit 1
          fi
          echo "toolchain=$toolchain" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain and device target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.toolchain }}
          targets: aarch64-apple-ios

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Provide cargo-tauri wrapper for Xcode
        shell: bash
        run: |
          mkdir -p "$HOME/.cargo/bin"
          cat <<'EOF' > "$HOME/.cargo/bin/cargo-tauri"
          #!/usr/bin/env bash
          if [[ "${1:-}" == "tauri" ]]; then
            shift
          fi
          exec bun run tauri "$@"
          EOF
          chmod +x "$HOME/.cargo/bin/cargo-tauri"

      - name: Validate iOS signing secrets
        shell: bash
        run: |
          test -n "$IOS_CERTIFICATE" || { echo "Missing IOS_CERTIFICATE secret" >&2; exit 1; }
          test -n "$IOS_CERTIFICATE_PASSWORD" || { echo "Missing IOS_CERTIFICATE_PASSWORD secret" >&2; exit 1; }
          test -n "$IOS_MOBILE_PROVISION" || { echo "Missing IOS_MOBILE_PROVISION secret" >&2; exit 1; }

      - name: Build signed iOS IPA
        run: bun run tauri ios build --ci --target aarch64 --export-method debugging

      - name: Upload signed iOS IPA
        uses: actions/upload-artifact@v6
        with:
          name: hyperion-ios-signed
          if-no-files-found: error
          retention-days: 14
          path: src-tauri/gen/apple/build/arm64/*.ipa
